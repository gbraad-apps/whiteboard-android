<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Drawing App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #canvas {
            display: block;
            touch-action: none;
            background: #ffffff;
        }
        .toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #f5f5f5;
            padding: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
            border-top: 1px solid #ddd;
            z-index: 1000;
        }
        button {
            padding: 10px 20px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button.active {
            background: #6965db;
            color: white;
            border-color: #6965db;
        }
        .color-picker {
            width: 50px;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        .hamburger-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-panel {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.3);
            transition: right 0.3s ease;
            z-index: 1999;
            overflow-y: auto;
            padding: 60px 20px 20px 20px;
        }
        .menu-panel.open {
            right: 0;
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1998;
            display: none;
        }
        .menu-overlay.show {
            display: block;
        }
        .menu-section {
            margin-bottom: 25px;
        }
        .menu-section h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-item {
            margin-bottom: 15px;
        }
        .menu-item label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #333;
        }
        .menu-item input[type="range"] {
            width: 100%;
        }
        .menu-item input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        .menu-item select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .color-palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        .color-swatch.active {
            border-color: #6965db;
            border-width: 3px;
        }
    </style>
</head>
<body>
    <button class="hamburger-btn" id="hamburger-btn">☰</button>

    <div class="menu-overlay" id="menu-overlay"></div>
    <div class="menu-panel" id="menu-panel">
        <div class="menu-section">
            <h3>Drawing Tools</h3>
            <div class="menu-item">
                <label>Stroke Width: <span id="width-value">2</span>px</label>
                <input type="range" id="stroke-width" min="1" max="20" value="2">
            </div>
            <div class="menu-item">
                <label>Eraser Size: <span id="eraser-value">20</span>px</label>
                <input type="range" id="eraser-size" min="5" max="50" value="20">
            </div>
        </div>

        <div class="menu-section">
            <h3>Colors</h3>
            <div class="menu-item">
                <label>Color Palette</label>
                <div class="color-palette">
                    <div class="color-swatch active" style="background: #000000" data-color="#000000"></div>
                    <div class="color-swatch" style="background: #FF0000" data-color="#FF0000"></div>
                    <div class="color-swatch" style="background: #00FF00" data-color="#00FF00"></div>
                    <div class="color-swatch" style="background: #0000FF" data-color="#0000FF"></div>
                    <div class="color-swatch" style="background: #FFFF00" data-color="#FFFF00"></div>
                    <div class="color-swatch" style="background: #FF00FF" data-color="#FF00FF"></div>
                    <div class="color-swatch" style="background: #00FFFF" data-color="#00FFFF"></div>
                    <div class="color-swatch" style="background: #FFA500" data-color="#FFA500"></div>
                    <div class="color-swatch" style="background: #800080" data-color="#800080"></div>
                    <div class="color-swatch" style="background: #808080" data-color="#808080"></div>
                    <div class="color-swatch" style="background: #FFC0CB" data-color="#FFC0CB"></div>
                    <div class="color-swatch" style="background: #A52A2A" data-color="#A52A2A"></div>
                </div>
            </div>
            <div class="menu-item">
                <label>Custom Color</label>
                <input type="color" id="custom-color" value="#000000">
            </div>
        </div>

        <div class="menu-section">
            <h3>Background</h3>
            <div class="menu-item">
                <label>Background Color</label>
                <input type="color" id="bg-color" value="#ffffff">
            </div>
        </div>

        <div class="menu-section">
            <button id="clear-canvas-btn" style="width: 100%; padding: 15px; background: #ff4444; color: white; border: none;">Clear Canvas</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>
    <div class="toolbar">
        <button id="pen-btn" class="active">Pen</button>
        <button id="eraser-btn">Eraser</button>
        <input type="color" id="color-picker" class="color-picker" value="#000000">
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const penBtn = document.getElementById('pen-btn');
        const eraserBtn = document.getElementById('eraser-btn');
        const colorPicker = document.getElementById('color-picker');
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const menuPanel = document.getElementById('menu-panel');
        const menuOverlay = document.getElementById('menu-overlay');
        const clearCanvasBtn = document.getElementById('clear-canvas-btn');
        const strokeWidthInput = document.getElementById('stroke-width');
        const eraserSizeInput = document.getElementById('eraser-size');
        const customColorInput = document.getElementById('custom-color');
        const bgColorInput = document.getElementById('bg-color');

        let drawing = false;
        let currentTool = 'pen';
        let currentColor = '#000000';
        let strokeWidth = 2;
        let eraserSize = 20;
        let bgColor = '#ffffff';
        let paths = [];
        let currentPath = null;

        // Set canvas size
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();

            canvas.width = rect.width * dpr;
            canvas.height = (window.innerHeight - 70) * dpr; // 70px for toolbar

            ctx.scale(dpr, dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = (window.innerHeight - 70) + 'px';

            redraw();
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Drawing functions
        function startDrawing(e) {
            drawing = true;
            const pos = getPosition(e);

            currentPath = {
                tool: currentTool,
                color: currentColor,
                width: currentTool === 'eraser' ? eraserSize : strokeWidth,
                eraserColor: bgColor,
                points: [pos]
            };
        }

        function draw(e) {
            if (!drawing) return;

            const pos = getPosition(e);
            currentPath.points.push(pos);

            // Draw current stroke
            ctx.strokeStyle = currentTool === 'eraser' ? bgColor : currentColor;
            ctx.lineWidth = currentTool === 'eraser' ? eraserSize : strokeWidth;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const points = currentPath.points;
            const lastPoint = points[points.length - 2];

            ctx.beginPath();
            ctx.moveTo(lastPoint.x, lastPoint.y);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function stopDrawing() {
            if (!drawing) return;
            drawing = false;

            if (currentPath && currentPath.points.length > 0) {
                paths.push(currentPath);
                currentPath = null;
                notifyAndroid();
            }
        }

        function getPosition(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        }

        function redraw() {
            // Fill background
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            paths.forEach(path => {
                if (path.points.length < 2) return;

                ctx.strokeStyle = path.tool === 'eraser' ? (path.eraserColor || bgColor) : path.color;
                ctx.lineWidth = path.width || (path.tool === 'eraser' ? 20 : 2);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.beginPath();
                ctx.moveTo(path.points[0].x, path.points[0].y);

                for (let i = 1; i < path.points.length; i++) {
                    ctx.lineTo(path.points[i].x, path.points[i].y);
                }

                ctx.stroke();
            });
        }

        function clearCanvas() {
            if (confirm('Clear entire canvas?')) {
                paths = [];
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                notifyAndroid();
            }
        }

        function notifyAndroid() {
            if (window.Android) {
                const data = {
                    type: 'excalidraw',
                    version: 1,
                    source: 'simple-canvas',
                    elements: paths,
                    appState: {
                        viewBackgroundColor: bgColor
                    }
                };
                window.Android.onSceneChange(JSON.stringify(data));
            }
        }

        // Event listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing(e);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopDrawing();
        });

        // Tool buttons
        penBtn.addEventListener('click', () => {
            currentTool = 'pen';
            penBtn.classList.add('active');
            eraserBtn.classList.remove('active');
        });

        eraserBtn.addEventListener('click', () => {
            currentTool = 'eraser';
            eraserBtn.classList.add('active');
            penBtn.classList.remove('active');
        });

        colorPicker.addEventListener('change', (e) => {
            currentColor = e.target.value;
            currentTool = 'pen';
            penBtn.classList.add('active');
            eraserBtn.classList.remove('active');
        });

        // Hamburger menu
        hamburgerBtn.addEventListener('click', () => {
            menuPanel.classList.add('open');
            menuOverlay.classList.add('show');
        });

        menuOverlay.addEventListener('click', () => {
            menuPanel.classList.remove('open');
            menuOverlay.classList.remove('show');
        });

        // Stroke width
        strokeWidthInput.addEventListener('input', (e) => {
            strokeWidth = parseInt(e.target.value);
            document.getElementById('width-value').textContent = strokeWidth;
        });

        // Eraser size
        eraserSizeInput.addEventListener('input', (e) => {
            eraserSize = parseInt(e.target.value);
            document.getElementById('eraser-value').textContent = eraserSize;
        });

        // Custom color
        customColorInput.addEventListener('input', (e) => {
            currentColor = e.target.value;
            colorPicker.value = e.target.value;
            currentTool = 'pen';
            penBtn.classList.add('active');
            eraserBtn.classList.remove('active');
        });

        // Background color
        bgColorInput.addEventListener('input', (e) => {
            bgColor = e.target.value;
            redraw();
        });

        // Color palette
        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                currentColor = swatch.dataset.color;
                colorPicker.value = currentColor;
                customColorInput.value = currentColor;
                currentTool = 'pen';
                penBtn.classList.add('active');
                eraserBtn.classList.remove('active');
            });
        });

        // Clear canvas button in menu
        clearCanvasBtn.addEventListener('click', () => {
            clearCanvas();
            menuPanel.classList.remove('open');
            menuOverlay.classList.remove('show');
        });

        // Load scene
        window.loadScene = function(jsonData) {
            try {
                const data = JSON.parse(jsonData);
                if (data.elements) {
                    paths = data.elements;
                }
                if (data.appState && data.appState.viewBackgroundColor) {
                    bgColor = data.appState.viewBackgroundColor;
                    bgColorInput.value = bgColor;
                }
                redraw();
            } catch (error) {
                console.error('Load error:', error);
            }
        };

        // Get scene
        window.getScene = function() {
            const data = {
                type: 'excalidraw',
                version: 1,
                source: 'simple-canvas',
                elements: paths,
                appState: {
                    viewBackgroundColor: '#ffffff'
                }
            };
            return JSON.stringify(data);
        };

        // Clear scene
        window.clearScene = function() {
            clearCanvas();
        };

        // Notify ready
        if (window.Android) {
            setTimeout(() => {
                window.Android.onExcalidrawReady();
            }, 100);
        }
    </script>
</body>
</html>
